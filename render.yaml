services:
  - type: web
    name: log-monitoring-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: 32789
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_SSL_CA
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_SECONDS
        value: 86400
      - key: CORS_ORIGINS
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: ALERT_RECEIVER
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false

  - type: web
    name: log-monitoring-frontend
    runtime: static
    rootDir: AI_Powered_Log_Monitoring_System/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
